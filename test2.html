<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>台北捷運即時車站清單</title>
    <style>
        :root { --primary-color: #0070bd; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8f9fa; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--primary-color); text-align: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; }
        #status { padding: 15px; border-radius: 6px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .loading { background-color: #e3f2fd; color: #1976d2; }
        .error { background-color: #ffedee; color: #d32f2f; }
        .success { background-color: #e8f5e9; color: #2e7d32; }
        .station-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .station-item { padding: 10px; border: 1px solid #dee2e6; border-radius: 4px; background: #fff; display: flex; align-items: center; }
        .station-item:hover { border-color: var(--primary-color); background: #f0f7ff; }
        .badge { background: var(--primary-color); color: white; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; margin-right: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>台北捷運車站清單</h1>
    <div id="status" class="loading">正在嘗試跨網域連線...</div>
    <div id="station-list" class="station-grid"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('station-list');

        // 使用 allorigins 代理，這對處理來自 file:/// 的請求相對包容
        const targetUrl = 'https://tcgmetro.blob.core.windows.net/stationnames/stations.json';
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&timestamp=${Date.now()}`;

        fetch(proxyUrl)
            .then(res => {
                if (!res.ok) throw new Error('代理伺服器連線失敗');
                return res.json();
            })
            .then(data => {
                // allorigins 會把結果包在 data.contents 裡面
                const rawData = typeof data.contents === 'string' ? JSON.parse(data.contents) : data.contents;
                
                statusEl.textContent = `連線成功！已取得 ${rawData.length} 個車站資料`;
                statusEl.className = 'status success';
                
                renderStations(rawData);
            })
            .catch(err => {
                statusEl.innerHTML = `連線失敗：${err.message}<br><small>提示：請檢查網路或嘗試重新載入</small>`;
                statusEl.className = 'status error';
                console.error('Debug Info:', err);
            });

        function renderStations(stations) {
            listEl.innerHTML = '';
            stations.forEach(s => {
                const div = document.createElement('div');
                div.className = 'station-item';
                // 這裡根據你的 JSON 結構：stationAddress 是代碼，stationName.zh 是中文名
                const code = s.stationAddress || 'N/A';
                const name = s.stationName?.zh || '未知車站';
                
                div.innerHTML = `<span class="badge">${code}</span> <span>${name}</span>`;
                listEl.appendChild(div);
            });
        }
    });
</script>

</body>
</html>
